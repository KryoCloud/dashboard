<aside class="relative z-10 flex h-screen w-72 flex-shrink-0 flex-col overflow-hidden border-r border-white/10 bg-slate-950/72 backdrop-blur-2xl">
  <div class="flex items-center gap-3 border-b border-white/8 px-5 py-5">
    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-linear-to-br from-cyan-300 to-sky-600 text-sm font-black tracking-[0.18em] text-slate-950 shadow-[0_0_24px_rgba(34,211,238,0.35)]">KC</div>
    <div>
      <p class="text-sm font-semibold tracking-[0.08em] text-white">KryoCloud</p>
      <p class="mt-0.5 text-[11px] uppercase tracking-[0.22em] text-cyan-200/60">Control Mesh</p>
    </div>
  </div>

  <nav class="flex flex-1 flex-col gap-6 px-4 py-5" aria-label="Sidebar navigation">
    @for (group of navGroups(); track group.heading) {
      <div class="space-y-2">
        <p class="px-3 text-[10px] font-semibold uppercase tracking-[0.22em] text-slate-500">{{ group.heading }}</p>
        @for (item of group.items; track item.label) {
          <a
            [routerLink]="item.route"
            [routerLinkActiveOptions]="{ exact: true }"
            class="group flex items-center gap-3 rounded-2xl border px-3 py-2.5 text-sm transition"
            [class]="rla.isActive ? 'border-cyan-400/25 bg-cyan-400/10 text-white shadow-[0_0_24px_rgba(34,211,238,0.08)]' : 'border-transparent bg-transparent text-slate-400 hover:border-white/10 hover:bg-white/5 hover:text-slate-100'"
            #rla="routerLinkActive"
            routerLinkActive
          >
            <span class="flex h-9 w-9 items-center justify-center rounded-xl border transition"
                  [class]="rla.isActive ? 'border-cyan-400/20 bg-cyan-400/10 text-cyan-200' : 'border-white/5 bg-white/4 text-slate-500 group-hover:border-white/10 group-hover:text-slate-200'"
                  aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.5" class="h-4 w-4">
                <path stroke-linecap="round" stroke-linejoin="round"
                      [attr.d]="navIcons[item.icon]"/>
              </svg>
            </span>
            <span class="font-medium">{{ item.label }}</span>
            @if (rla.isActive) {
              <span class="ml-auto h-2 w-2 rounded-full bg-cyan-300 shadow-[0_0_12px_rgba(103,232,249,0.9)]"></span>
            }
          </a>
        }
      </div>
    }
  </nav>

  <div class="space-y-2 border-t border-white/8 px-4 py-4">
    <a href="#" class="flex items-center gap-3 rounded-2xl border border-white/6 bg-white/3 px-3 py-2.5 text-sm text-slate-400 transition hover:border-cyan-400/20 hover:bg-cyan-400/8 hover:text-cyan-100">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           class="h-4 w-4 shrink-0" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
      </svg>
      Documentation
    </a>
    <a href="#" class="flex items-center gap-3 rounded-2xl border border-white/6 bg-white/3 px-3 py-2.5 text-sm text-slate-400 transition hover:border-orange-300/20 hover:bg-orange-300/8 hover:text-orange-100">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           class="h-4 w-4 shrink-0" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
      </svg>
      Support
    </a>
  </div>

  <div class="flex items-center gap-3 border-t border-white/8 px-5 py-4">
    <div class="flex h-10 w-10 items-center justify-center rounded-full bg-linear-to-br from-cyan-300 to-sky-600 text-sm font-bold text-slate-950 shadow-[0_0_18px_rgba(34,211,238,0.35)]">E</div>
    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-medium text-slate-100">ezTxmMC</p>
      <p class="text-[11px] uppercase tracking-[0.18em] text-orange-200/60">Admin</p>
    </div>
    <button class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-white/8 bg-white/4 text-slate-400 transition hover:border-orange-300/20 hover:bg-orange-300/8 hover:text-orange-100"
            aria-label="User menu">
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-3.5 w-3.5">
        <circle cx="4"  cy="10" r="1.5"/>
        <circle cx="10" cy="10" r="1.5"/>
        <circle cx="16" cy="10" r="1.5"/>
      </svg>
    </button>
  </div>
</aside>
