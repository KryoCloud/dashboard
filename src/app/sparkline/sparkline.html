<div class="flex h-full flex-col rounded-[30px] border border-white/10 bg-white/6 p-6 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)] backdrop-blur-xl">
  <div class="flex items-start justify-between">
    <div>
      <p class="text-lg font-semibold text-white">{{ series().title }}</p>
      <p class="mt-1 text-sm text-slate-400">{{ series().subtitle }}</p>
    </div>
    <span class="inline-flex items-baseline gap-1 rounded-2xl border border-white/10 bg-white/5 px-3 py-1.5">
      <span class="text-xl font-bold leading-none text-white">
        {{ currentValue() }}
      </span>
      <span class="text-[10px] uppercase tracking-[0.18em] text-slate-500">now</span>
    </span>
  </div>

  <!-- SVG sparkline -->
  <div class="mt-4 flex-1" style="min-height: 110px;">
    <svg viewBox="0 0 320 100" class="h-full w-full" preserveAspectRatio="none">
      <defs>
        <linearGradient [attr.id]="gradId()" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   [attr.stop-color]="series().color" stop-opacity="0.30"/>
          <stop offset="100%" [attr.stop-color]="series().color" stop-opacity="0"/>
        </linearGradient>
        <filter [attr.id]="filtId()">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
          <feMerge>
            <feMergeNode in="b"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <polygon [attr.points]="polylineFill(series().points, 100)"
               [attr.fill]="'url(#' + gradId() + ')'"/>
      <polyline [attr.points]="polyline(series().points)"
                fill="none"
                [attr.stroke]="series().color"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                [attr.filter]="'url(#' + filtId() + ')'"/>
    </svg>
  </div>

  <div class="mt-3 flex justify-between font-[JetBrains_Mono] text-[11px] text-slate-500">
    @for (lbl of series().labels; track lbl) {
      <span>{{ lbl }}</span>
    }
  </div>
</div>
